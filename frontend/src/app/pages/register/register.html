<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <div class="auth-card__icon">✓</div>
      <h1 class="auth-card__brand">TodoAI</h1>
    </div>

    <h2 class="auth-card__title">Create account</h2>
    <p class="auth-card__subtitle">Start organizing your tasks with AI</p>

    @if (error()) {
      <div class="alert alert-danger py-2 px-3 mb-3" role="alert">
        {{ error() }}
      </div>
    }

    <form (ngSubmit)="onSubmit()" novalidate>
      <div class="mb-3">
        <label for="fullName" class="form-label">Full name <span class="text-muted">(optional)</span></label>
        <input
          id="fullName"
          type="text"
          class="form-control"
          [(ngModel)]="fullName"
          name="fullName"
          placeholder="Jane Smith"
          autocomplete="name"
        />
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email address <span class="required">*</span></label>
        <input
          id="email"
          type="email"
          class="form-control"
          [(ngModel)]="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <div class="mb-4">
        <label for="password" class="form-label">Password <span class="required">*</span></label>
        <input
          id="password"
          type="password"
          class="form-control"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          autocomplete="new-password"
          required
        />
      </div>

      <button
        type="submit"
        class="btn btn-primary w-100 auth-btn"
        [disabled]="loading()"
      >
        @if (loading()) {
          <span class="spinner-border spinner-border-sm me-2" role="status"></span>
          Creating account...
        } @else {
          Create account
        }
      </button>
    </form>

    <p class="auth-card__footer">
      Already have an account?
      <a routerLink="/login" class="auth-card__link">Sign in</a>
    </p>
  </div>
</div>
